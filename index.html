<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Połączenia z Firebase</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 20px; max-width: 500px; margin: 0 auto; }
        .box { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        button { background: #38bdf8; color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 15px; width: 100%; margin-bottom: 10px; }
        .btn-clear { background: #ef4444; color: #fff; }
        #debug-log { background: #000; color: #32cd32; padding: 10px; font-family: monospace; font-size: 11px; height: 160px; overflow-y: auto; border-radius: 6px; border: 1px solid #333; line-height: 1.4; }
        .tile { background: rgba(56, 189, 248, 0.15); padding: 10px; margin-bottom: 6px; border-radius: 8px; border: 1px solid #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Test Bazy Firebase 📡</h2>

    <div class="box">
        <button id="btn-add">➕ Dodaj testowy kafelek</button>
        <button id="btn-clear" class="btn-clear">🗑️ Wyczyść bazę</button>
    </div>

    <div class="box">
        <h3>Kafelki z bazy danych:</h3>
        <div id="tiles-container">Ładowanie danych...</div>
    </div>

    <div class="box">
        <h3>Logi połączenia (na żywo):</h3>
        <div id="debug-log">Inicjalizacja skryptu...<br></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        function log(msg) {
            const logger = document.getElementById('debug-log');
            const time = new Date().toLocaleTimeString();
            logger.innerHTML += `[${time}] ${msg}<br>`;
            logger.scrollTop = logger.scrollHeight;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAlF_XfCacX98_6NYhkrQ0dI5AC1ykKojU",
            authDomain: "kiddodo-32c0e.firebaseapp.com",
            projectId: "kiddodo-32c0e",
            storageBucket: "kiddodo-32c0e.firebasestorage.app",
            messagingSenderId: "655398128952",
            appId: "1:655398128952:web:39b190b5ff4b7ef6ff85cd"
        };

        let db, docRef;
        let localTiles = [];

        try {
            log("Łączenie z Firebase...");
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            docRef = doc(db, "kiddodo", "appState");
            log("Inicjalizacja udana.");
        } catch (err) {
            log("❌ BŁĄD INICJALIZACJI: " + err.message);
        }

        if (docRef) {
            log("Uruchamiam nasłuchiwanie chmury...");
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    localTiles = data.testTiles || [];
                    log(`Pobrano dane! Liczba kafelków: ${localTiles.length}`);
                    render();
                } else {
                    log("Brak dokumentu w bazie. Tworzę nowy...");
                    localTiles = [];
                    save();
                }
            }, (err) => {
                log("❌ BŁĄD ODCZYTU Z BAZY: " + err.message);
            });
        }

        async function save() {
            log("Zapisywanie danych do Firebase...");
            try {
                await setDoc(docRef, { testTiles: localTiles });
                log("✅ ZAPISANO W CHMURZE!");
            } catch (err) {
                log("❌ BŁĄD ZAPISU: " + err.message);
            }
        }

        function render() {
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            
            if (localTiles.length === 0) {
                container.innerHTML = '<span style="color:#888;">Brak kafelków. Kliknij niebieski przycisk powyżej!</span>';
                return;
            }

            localTiles.forEach(tile => {
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerText = "🎯 " + tile.title;
                container.appendChild(div);
            });
        }

        document.getElementById('btn-add').addEventListener('click', () => {
            const id = Date.now();
            log(`Dodaję kafelek o ID: ${id}`);
            localTiles.push({ id: id, title: "Kafelek " + Math.floor(Math.random() * 100) });
            save();
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            log("Czyszczę kafelki...");
            localTiles = [];
            save();
        });
    </script>
</body>
</html>
