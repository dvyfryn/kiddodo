<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiddoDo</title>
    <!-- Ikony i Konfetti -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Plik Stylów CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>KiddoDo</h1>
        <div class="header-actions">
            <!-- Ikonka Pucharu do otwierania Rankingu -->
            <button class="btn-header btn-trophy" onclick="openRankingModal()" title="Ranking i Cele">
                <i class="fa-solid fa-trophy"></i>
            </button>
            
            <!-- Kosz do usuwania kafelków -->
            <button class="btn-header" id="btn-tile-delete-toggle" onclick="toggleTileDeleteMode()" title="Tryb usuwania kafelków">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            
            <!-- Kłódka Rodzica -->
            <button class="btn-header" id="parent-lock" onclick="toggleParentMode()">
                <i class="fa-solid fa-lock" id="lock-icon"></i> Rodzic
            </button>
        </div>
    </header>

    <!-- Filtry Osób (Główny Widok) -->
    <div class="children-selector">
        <button class="chip active" onclick="filterTasks('all', this)">Wszyscy</button>
        <button class="chip" onclick="filterTasks('Paweł', this)">Paweł</button>
        <button class="chip" onclick="filterTasks('Madzia', this)">Madzia</button>
    </div>

    <!-- Lista Aktywnych Questów -->
    <div class="task-list" id="tasks-list"></div>

    <!-- Panel Dolny z Kafelkami -->
    <div class="bottom-panel">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="tile-search" placeholder="Szukaj Questu..." oninput="filterTilesBySearch()">
        </div>

        <div class="quest-tiles" id="tiles-container"></div>

        <div class="parent-form">
            <span style="font-size: 0.8rem; color: var(--accent-purple); font-weight: 700;">➕ Stwórz nowy kafelek Questu:</span>
            <div class="parent-inputs">
                <input type="text" id="new-tile-title" placeholder="Nazwa (np. Mycie naczyń)">
                <input type="number" id="new-tile-points" placeholder="Pkt" value="10">
                <button class="btn-add-tile" onclick="createNewTile()"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </div>

    <!-- MODAL (OKIENKO) RANKINGU I CHECKPOINTÓW -->
    <div class="modal-overlay" id="ranking-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🏆 Ranking i Nagrody</h2>
                <button class="btn-close-modal" onclick="closeRankingModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="period-tabs">
                <button class="period-tab active" onclick="switchPeriod('daily', this)">Dzienny</button>
                <button class="period-tab" onclick="switchPeriod('weekly', this)">Tygodniowy</button>
                <button class="period-tab" onclick="switchPeriod('monthly', this)">Miesięczny</button>
                <button class="period-tab" onclick="switchPeriod('yearly', this)">Roczny</button>
            </div>

            <div class="leaderboard">
                <div class="score-box" id="box-pawel">
                    <span class="crown">👑</span>
                    <div class="name">👦 Paweł</div>
                    <div class="pts" id="score-pawel">0 pkt</div>
                </div>
                <div class="score-box" id="box-madzia">
                    <span class="crown">👑</span>
                    <div class="name">👧 Madzia</div>
                    <div class="pts" id="score-madzia">0 pkt</div>
                </div>
            </div>

            <div class="checkpoints-title" id="checkpoints-label">
                Cele dla: Paweł
            </div>
            <div id="checkpoints-container"></div>
        </div>
    </div>

    <!-- Główny Skrypt JS -->
    <script src="app.js"></script>
</body>
</html>
