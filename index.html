<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiddoDo</title>
    
    <!-- PWA & Mobile settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #A29BFE;
            --accent: #FD79A8;
            --background: #F8F9FA;
            --card-bg: #FFFFFF;
            --text: #2D3436;
            --success: #00B894;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding-bottom: 80px;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px 15px;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2);
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .child-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .child-chip {
            background: white;
            padding: 10px 18px;
            border-radius: 25px;
            font-weight: 600;
            border: 2px solid #E2E8F0;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .child-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .task-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary);
        }

        .task-card.completed {
            opacity: 0.6;
            border-left-color: var(--success);
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
        }

        .task-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .task-info p {
            font-size: 13px;
            color: #636E72;
        }

        .points-badge {
            background: #FFEAA7;
            color: #D63031;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
        }

        .btn-check {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-check.done {
            background: var(--success);
        }

        .admin-panel {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        input, select, button {
            padding: 12px;
            border: 1px solid #DFE6E9;
            border-radius: 10px;
            font-size: 15px;
        }

        button.btn-add {
            background: var(--accent);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>KiddoDo 🚀</h1>
    </header>

    <div class="container">
        <!-- Wybór profilu dziecka -->
        <div class="child-selector">
            <div class="child-chip active" onclick="switchChild('Wszyscy')">Wszyscy</div>
            <div class="child-chip" onclick="switchChild('Paweł')">👦 Paweł</div>
            <div class="child-chip" onclick="switchChild('Ania')">👧 Ania</div>
        </div>

        <!-- Lista zadań -->
        <div id="tasks-list">
            <div class="task-card">
                <div class="task-info">
                    <h3 class="task-title">Sprzątanie pokoju <span class="points-badge">+10 pkt</span></h3>
                    <p>Przypisane do: Paweł</p>
                </div>
                <button class="btn-check" onclick="toggleTask(this)"><i class="fa-solid fa-check"></i></button>
            </div>
        </div>

        <!-- Panel dodawania nowych zadań (Dla rodzica) -->
        <div class="admin-panel">
            <h3>➕ Dodaj nowe zadanie</h3>
            <div class="input-group">
                <input type="text" id="task-title" placeholder="Nazwa zadania (np. Umyj zęby)">
                <select id="task-assignee">
                    <option value="Paweł">👦 Paweł</option>
                    <option value="Ania">👧 Ania</option>
                </select>
                <input type="number" id="task-points" placeholder="Punkty (np. 5)" value="5">
                <button class="btn-add" onclick="addNewTask()">Dodaj zadanie</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Skrypty połączeniowe) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // TUTAJ WKLIMY TWOJE KLUCZE KONFIGURACYJNE FIREBASE
        const firebaseConfig = {
            apiKey: "TWÓJ_API_KEY",
            authDomain: "twoj-projekt.firebaseapp.com",
            projectId: "twoj-projekt",
            storageBucket: "twoj-projekt.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // Inicjalizacja Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        console.log("Firebase połączony pomyślnie!");
    </script>

    <script>
        function toggleTask(btn) {
            const card = btn.closest('.task-card');
            card.classList.toggle('completed');
            if(card.classList.contains('completed')) {
                btn.classList.add('done');
                btn.innerHTML = '<i class="fa-solid fa-check-double"></i>';
            } else {
                btn.classList.remove('done');
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
            }
        }

        function switchChild(name) {
            document.querySelectorAll('.child-chip').forEach(chip => chip.classList.remove('active'));
            event.target.classList.add('active');
        }

        function addNewTask() {
            const title = document.getElementById('task-title').value;
            const assignee = document.getElementById('task-assignee').value;
            const points = document.getElementById('task-points').value;

            if(!title) return alert("Wpisz nazwę zadania!");

            const list = document.getElementById('tasks-list');
            const newTask = document.createElement('div');
            newTask.className = 'task-card';
            newTask.innerHTML = `
                <div class="task-info">
                    <h3 class="task-title">${title} <span class="points-badge">+${points} pkt</span></h3>
                    <p>Przypisane do: ${assignee}</p>
                </div>
                <button class="btn-check" onclick="toggleTask(this)"><i class="fa-solid fa-check"></i></button>
            `;
            list.appendChild(newTask);

            document.getElementById('task-title').value = '';
        }
    </script>
</body>
</html>
