<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiddoDo</title>
    <!-- Ikony i Konfetti -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Plik Stylów CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>KiddoDo</h1>
        <div class="header-actions">
            <!-- Przywrócony Złoty Puchar -->
            <button class="btn-header btn-trophy" onclick="openRankingModal()" title="Laboratorium & Sklepik">
                <i class="fa-solid fa-trophy"></i>
            </button>
            
            <!-- Usuwanie kafelków -->
            <button class="btn-header" id="btn-tile-delete-toggle" onclick="toggleTileDeleteMode()" title="Tryb usuwania kafelków">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            
            <!-- Kłódka Rodzica -->
            <button class="btn-header" id="parent-lock" onclick="toggleParentMode()">
                <i class="fa-solid fa-lock" id="lock-icon"></i> Rodzic
            </button>
        </div>
    </header>

    <!-- Banner Happy Hour x3 -->
    <div id="boost-banner" class="boost-banner">
        ✨ MAGIZCZNE HAPPY HOUR! Pierwszy Quest da x3 PKT! ✨
    </div>

    <!-- Filtry Osób (Główny Widok) -->
    <div class="children-selector">
        <button class="chip active" id="chip-all" onclick="filterTasks('all', this)">Wszyscy</button>
        <button class="chip" id="chip-pawel" onclick="filterTasks('Paweł', this)">Paweł</button>
        <button class="chip" id="chip-madzia" onclick="filterTasks('Madzia', this)">Madzia</button>
    </div>

    <!-- Lista Aktywnych Questów -->
    <div class="task-list" id="tasks-list"></div>

    <!-- Panel Dolny z Kafelkami Questów -->
    <div class="bottom-panel">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="tile-search" placeholder="Szukaj Questu..." oninput="filterTilesBySearch()">
        </div>

        <div class="quest-tiles" id="tiles-container"></div>

        <!-- Panel Rodzica -->
        <div class="parent-form">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                <span style="font-size: 0.8rem; color: var(--accent-purple); font-weight: 700;">➕ Stwórz kafelek Questu:</span>
                <button class="btn-boost" onclick="activateHappyHour()"><i class="fa-solid fa-wand-magic-sparkles"></i> Happy Hour x3</button>
            </div>
            <div class="parent-inputs">
                <input type="text" id="new-tile-title" placeholder="Nazwa (np. Mycie naczyń)">
                <input type="number" id="new-tile-points" placeholder="Pkt" value="10">
                <button class="btn-add-tile" onclick="createNewTile()"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </div>

    <!-- OKNO MODALNE: MAGICZNE LABORATORIUM & SKLEPIK -->
    <div class="modal-overlay" id="ranking-modal">
        <div class="modal-content modal-vials magical-theme">
            <div class="modal-header">
                <h2>🧙‍♂️ Magiczne Komnaty & 🛒 Sklepik</h2>
                <button class="btn-close-modal" onclick="closeRankingModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <!-- Przełącznik Okresów -->
            <div class="period-tabs">
                <button class="period-tab active" onclick="switchPeriod('daily', this)">Dzienny</button>
                <button class="period-tab" onclick="switchPeriod('weekly', this)">Tygodniowy</button>
                <button class="period-tab" onclick="switchPeriod('monthly', this)">Miesięczny</button>
                <button class="period-tab" onclick="switchPeriod('yearly', this)">Roczny</button>
            </div>

            <!-- EKRAN 3 FIOLEK (Klikalne Nagłówki Imion) -->
            <div class="vials-container">
                <div class="vial-wrapper" onclick="selectKidInModal('Paweł')">
                    <div class="vial-title clickable" id="vial-title-pawel">👦 Paweł ✨</div>
                    <div class="vial-pts" id="pts-vial-pawel">0 pkt</div>
                    <div class="vial-glass">
                        <div class="vial-liquid liquid-pawel" id="liquid-pawel"></div>
                        <div class="vial-marks" id="marks-pawel"></div>
                    </div>
                </div>

                <div class="vial-wrapper vial-shared">
                    <div class="vial-title">🚗 Rodzina</div>
                    <div class="vial-pts" id="pts-vial-shared">0 pkt</div>
                    <div class="vial-glass">
                        <div class="vial-liquid liquid-shared" id="liquid-shared"></div>
                        <div class="vial-marks" id="marks-shared"></div>
                    </div>
                </div>

                <div class="vial-wrapper" onclick="selectKidInModal('Madzia')">
                    <div class="vial-title clickable" id="vial-title-madzia">👧 Madzia ✨</div>
                    <div class="vial-pts" id="pts-vial-madzia">0 pkt</div>
                    <div class="vial-glass">
                        <div class="vial-liquid liquid-madzia" id="liquid-madzia"></div>
                        <div class="vial-marks" id="marks-madzia"></div>
                    </div>
                </div>
            </div>

            <!-- SKLEPIK DZIENNYCH NAGRÓD -->
            <div class="shop-section">
                <div class="shop-header">
                    <span>🛒 Dzienny Sklepik Nagród</span>
                    <span class="shop-budget" id="shop-budget-display">Budżet dziś: 0 pkt</span>
                </div>
                <div class="shop-items" id="shop-items-container"></div>
            </div>

            <!-- Panel Zarządzania Rodzica -->
            <div class="parent-goals-manager">
                <div style="font-size: 0.8rem; font-weight: 700; color: var(--accent-purple); margin-bottom: 6px;">
                    🛠️ Panel Rodzica (Dodawanie):
                </div>
                <div style="display: flex; gap: 6px;">
                    <button class="btn-add-goal" onclick="addNewGoalPrompt()">➕ Długoterminowa nagroda</button>
                    <button class="btn-add-goal" style="background: var(--accent-blue); color:#000;" onclick="addNewShopItemPrompt()">🛒 Dzienny Kupon</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Skrypt JS -->
    <script src="app.js"></script>
</body>
</html>
