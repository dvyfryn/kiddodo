<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiddoDo - Questy i Nagrody</title>

    <!-- FontAwesome & Confetti -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Arkusz Stylów z wymuszeniem odświeżenia cache -->
    <link rel="stylesheet" href="style.css?v=100">
</head>
<body>

    <!-- BANNER HAPPY HOUR -->
    <div id="boost-banner" class="boost-banner">
        <span>🔥 HAPPY HOUR AKTYWNE! Nastepny Quest daje x3 PKT! 🔥</span>
    </div>

    <!-- NAGŁÓWEK -->
    <header>
        <div class="logo">
            <h1>KiddoDo 🎯</h1>
        </div>
        <div class="header-actions">
            <button class="icon-btn trophy-btn" onclick="window.openRankingModal()" title="Puchar i Fiolki">
                <i class="fa-solid fa-trophy"></i>
            </button>
            <button class="icon-btn lock-btn" id="parent-lock" onclick="window.openPinModal()" title="Tryb Rodzica">
                <i class="fa-solid fa-lock" id="lock-icon"></i>
            </button>
        </div>
    </header>

    <!-- PRZEŁĄCZNIK DZIECI (TYLKO PAWEŁ I MADZIA) -->
    <div class="children-selector">
        <button class="chip active" id="chip-pawel" onclick="window.filterTasks('Paweł', this)">Paweł</button>
        <button class="chip" id="chip-madzia" onclick="window.filterTasks('Madzia', this)">Madzia</button>
    </div>

    <!-- LISTA AKTYWNYCH ZADAŃ -->
    <main class="task-list" id="tasks-list"></main>

    <!-- UKRYTY INPUT APARATU -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">

    <!-- PANEL PANELU RODZICA (Gdy odblokowane) -->
    <div class="parent-controls" id="parent-controls">
        <button class="btn-happy-hour" onclick="window.activateHappyHour()">⚡ Włącz Happy Hour (x3 PKT)</button>
        <button class="btn-add-goal" onclick="window.addNewGoalPrompt()">🏆 Dodaj Nowy Cel</button>
        <button class="btn-add-shop" onclick="window.addNewShopItemPrompt()">🛍️ Dodaj Nagrodę do Sklepu</button>
    </div>

    <!-- DOLNY PANEL KAFELKÓW -->
    <div class="bottom-panel">
        <div class="panel-header">
            <span class="panel-title">Wybierz Quest:</span>
            <input type="text" id="tile-search" placeholder="Szukaj..." oninput="window.filterTilesBySearch()">
            <button class="btn-toggle-delete" id="btn-tile-delete-toggle" onclick="window.toggleTileDeleteMode()" title="Usuwaj kafelki">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        </div>

        <div class="quest-tiles" id="tiles-container"></div>

        <div class="tile-creator" id="tile-creator">
            <input type="text" id="new-tile-title" placeholder="Nazwa nowego Questu...">
            <input type="number" id="new-tile-points" placeholder="Pkt" value="10">
            <button onclick="window.createNewTile()">➕ Stwórz Kafelek</button>
        </div>
    </div>

    <!-- MODAL RANKINGU I FIOLEK -->
    <div class="modal-overlay" id="ranking-modal">
        <div class="modal-content ranking-modal-content">
            <button class="modal-close" onclick="window.closeRankingModal()">&times;</button>
            <h2>🏆 Postępy i Cele</h2>

            <div class="period-tabs">
                <button class="period-tab active" onclick="window.switchPeriod('daily', this)">Dzienny</button>
                <button class="period-tab" onclick="window.switchPeriod('weekly', this)">Tygodniowy</button>
                <button class="period-tab" onclick="window.switchPeriod('monthly', this)">Miesięczny</button>
                <button class="period-tab" onclick="window.switchPeriod('yearly', this)">Roczny</button>
            </div>

            <div class="vials-container">
                <div class="vial-wrapper" onclick="window.selectKidInModal('Paweł')">
                    <div class="vial-title" id="vial-title-pawel">Paweł</div>
                    <div class="vial-pts" id="pts-vial-pawel">0 pkt</div>
                    <div class="vial">
                        <div class="vial-liquid" id="liquid-pawel"></div>
                        <div class="vial-marks" id="marks-pawel"></div>
                    </div>
                </div>

                <div class="vial-wrapper" onclick="window.selectKidInModal('Madzia')">
                    <div class="vial-title" id="vial-title-madzia">Madzia</div>
                    <div class="vial-pts" id="pts-vial-madzia">0 pkt</div>
                    <div class="vial">
                        <div class="vial-liquid" id="liquid-madzia"></div>
                        <div class="vial-marks" id="marks-madzia"></div>
                    </div>
                </div>

                <div class="vial-wrapper">
                    <div class="vial-title">Rodzina</div>
                    <div class="vial-pts" id="pts-vial-shared">0 pkt</div>
                    <div class="vial shared-vial">
                        <div class="vial-liquid" id="liquid-shared"></div>
                        <div class="vial-marks" id="marks-shared"></div>
                    </div>
                </div>
            </div>

            <!-- SKLEPIK DZIENNY -->
            <hr class="modal-divider">
            <div class="shop-section">
                <h3>🛍️ Sklepik z Nagrodami</h3>
                <div class="shop-budget-title" id="shop-budget-display">Budżet: 0 pkt</div>
                <div class="shop-items-grid" id="shop-items-container"></div>
            </div>
        </div>
    </div>

    <!-- MODAL PIN -->
    <div class="modal-overlay" id="pin-modal">
        <div class="modal-content pin-modal-content">
            <button class="modal-close" onclick="window.closePinModal()">&times;</button>
            <h3>🔑 Podaj PIN Rodzica</h3>
            <input type="password" id="pin-input" maxlength="4" placeholder="****">
            <button class="btn-submit-pin" onclick="window.submitPin()">Zatwierdź</button>
        </div>
    </div>

    <!-- Skrypt Aplikacji z wymuszeniem odświeżenia cache -->
    <script type="module" src="app.js?v=100"></script>
</body>
</html>
